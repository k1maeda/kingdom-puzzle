<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王国パズル v6.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Noto+Serif+JP:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a0e06;
    background-image: radial-gradient(ellipse at 20% 20%, #2d1a0a 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, #0f1a0a 0%, transparent 60%);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 10px 10px 20px; font-family: 'Noto Serif JP', Georgia, serif;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif; color: #DAA520;
    text-shadow: 0 0 20px rgba(218,165,32,0.5); font-size: clamp(1.1rem,4vw,1.5rem);
    margin-bottom: 8px; letter-spacing: 2px;
  }

  .game-area {
    display: flex; flex-direction: column; align-items: center;
    gap: 7px; width: 100%; max-width: 480px;
  }

  /* ── Top Info Row ── */
  .top-row {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; color: #906030; font-size: 0.75rem; padding: 0 2px;
  }
  .top-row span { color: #C09050; font-weight: bold; }

  /* ── Stage Banner ── */
  .stage-banner {
    background: linear-gradient(135deg,#1a2a10,#243018);
    border: 2px solid #4A7030; border-bottom: none;
    border-radius: 12px 12px 0 0; padding: 8px 10px; width: 100%;
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .sb-item {
    background: rgba(0,0,0,0.3); border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; padding: 5px 4px; gap: 1px;
  }
  .sb-label { font-size: 0.58rem; color: #6A9050; letter-spacing: 0.5px; }
  .sb-val   { font-size: 1.15rem; font-weight: bold; line-height: 1; color: #B0E070; }
  .sb-sub   { font-size: 0.52rem; color: #6A9050; }
  .sb-val.warn   { color: #FFB040; }
  .sb-val.danger { color: #FF4040; animation: pulse 0.8s infinite; }
  .sb-val.good   { color: #60FF90; }

  /* ── Grid ── */
  .grid-wrap {
    background: linear-gradient(145deg,#2a1a0a,#1a0e06); border: 3px solid #6B4A14;
    border-bottom-color: #3A2A0A; border-right-color: #3A2A0A;
    border-radius: 14px; padding: 6px; width: 100%;
    box-shadow: 0 8px 28px rgba(0,0,0,0.7);
  }
  .grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; }

  .cell {
    aspect-ratio:1; background: linear-gradient(145deg,#5A3C20,#4A2C14);
    border: 2px solid #3A2210; border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s;
    position: relative; user-select: none; overflow: hidden;
  }
  .cell.empty { border-style: dashed; border-color: #4A3220; }
  .cell.empty:hover { border-color: #8B6020; }
  .cell.can-place { border-color: #7ABCFF!important; border-style: solid!important; box-shadow: 0 0 8px rgba(122,188,255,0.4); }
  /* 消える側 */
  .cell.merge-delete { border: 3px solid #FF3030!important; box-shadow: 0 0 14px rgba(255,48,48,0.8)!important; }
  /* 残る側 */
  .cell.merge-keep   { border: 3px solid #00EE77!important; box-shadow: 0 0 14px rgba(0,238,119,0.8)!important; }

  /* オーバーレイラベル（実DOM要素） */
  .merge-label {
    position: absolute; inset: 0; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem; font-weight: bold; pointer-events: none; z-index: 3;
  }
  .merge-label.del { background: rgba(160,0,0,0.65); color: #FFB0B0; }
  .merge-label.keep { background: rgba(0,100,50,0.65); color: #AAFFCC; }

  .cell.selected { border-color: #FFD700!important; box-shadow: 0 0 14px rgba(255,215,0,0.55); border-style: solid!important; }
  .cell.demolish-target {
    display:none; /* deprecated */
  }
  .cell.merge-target { border-color: #00FF88!important; border-style: solid!important; box-shadow: 0 0 10px rgba(0,255,136,0.5); }

  .cell[data-lv="1"]{background:linear-gradient(145deg,#5A3C20,#4A2C14)}
  .cell[data-lv="2"]{background:linear-gradient(145deg,#3C5020,#2C4014)}
  .cell[data-lv="3"]{background:linear-gradient(145deg,#20405A,#14304A)}
  .cell[data-lv="4"]{background:linear-gradient(145deg,#50204A,#401038)}
  .cell[data-lv="5"]{background:linear-gradient(145deg,#4A4010,#382E08)}
  .cell[data-lv="6"]{background:linear-gradient(145deg,#603010,#481C08)}
  .cell[data-lv="7"]{background:linear-gradient(145deg,#702010,#500808)}

  .b-lvl { position:absolute; top:2px; left:4px; font-size:0.5rem; color:#FFD700; font-weight:bold; background:rgba(0,0,0,0.45); border-radius:3px; padding:0 3px; }
  .b-icon { font-size:clamp(1.1rem,3.5vw,1.5rem); line-height:1; }
  .b-name { font-size:clamp(0.38rem,1.2vw,0.52rem); color:#F0DCA0; text-align:center; margin-top:1px; line-height:1.2; }
  .b-prod { position:absolute; bottom:2px; left:0; right:0; text-align:center; font-size:clamp(0.65rem,2.2vw,0.85rem); color:#90C888; font-weight:bold; text-shadow:0 1px 3px rgba(0,0,0,0.8); }

  /* ── Message ── */
  .message {
    background: rgba(10,6,2,0.75); border: 1px solid #5A3A14; border-radius: 8px;
    color: #D0B880; font-size: 0.75rem; min-height: 30px; padding: 5px 12px;
    width: 100%; text-align: center; display: flex; align-items: center; justify-content: center;
  }

  /* ── Controls ── */
  .controls { display: flex; gap: 8px; width: 100%; }
  .btn {
    flex:1; padding: 8px; border: 2px solid; border-radius: 8px;
    font-family: 'Noto Serif JP', serif; font-size: 0.82rem; font-weight: bold;
    cursor: pointer; transition: transform 0.1s, filter 0.1s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-next { background: linear-gradient(135deg,#9B7918,#DAA520); border-color: #FFD060; color: #1a0e06; }
  .btn-next:hover { filter: brightness(1.1); box-shadow: 0 4px 14px rgba(218,165,32,0.4); }
  .btn-cancel { background: linear-gradient(135deg,#2a1a0e,#3d2b1a); border-color: #5A3A14; color: #C0A060; }
  .btn-demolish { background: linear-gradient(135deg,#2a1205,#4a2208); border-color: #8B3A00; color: #FF9944; }
  .btn-demolish.active { background: linear-gradient(135deg,#6a2205,#9a3208); border-color: #FF6600; box-shadow: 0 0 10px rgba(255,102,0,0.5); }

  /* ── Cards ── */
  .cards-section { width: 100%; }
  .cards-label { color: #906030; font-size: 0.68rem; margin-bottom: 4px; text-align: center; }
  .cards { display: flex; gap: 7px; }
  .card {
    flex:1; background: linear-gradient(160deg,#F5E8C8,#E8D4A4); border: 2px solid #9B7020;
    border-radius: 11px; padding: 8px 4px 6px; text-align: center; cursor: pointer;
    transition: transform 0.13s, box-shadow 0.13s, border-color 0.13s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.4); border-color: #DAA520; }
  .card.selected-card { border-color: #FFD700; box-shadow: 0 0 18px rgba(255,215,0,0.5); transform: translateY(-5px); background: linear-gradient(160deg,#FFF4D8,#F8E0B0); }
  .card.locked { opacity: 0.38; pointer-events: none; }
  .c-icon { font-size: 1.5rem; display: block; }
  .c-lv { font-size: 0.58rem; color: #A07020; font-weight: bold; display: block; margin: 1px 0; }
  .c-name { font-size: 0.68rem; color: #3A2210; font-weight: bold; margin: 2px 0 1px; display: block; }
  .c-prod { font-size: 0.8rem; color: #2A6040; display: block; font-weight: bold; }
  .c-cost { font-size: 0.62rem; color: #8B1A1A; margin-top: 2px; display: block; }
  .c-compare { font-size: 0.5rem; color: #7A5020; display: block; margin-top: 2px; font-style: italic; }

  /* ══ RESOURCE PANEL (near cards) ══ */
  .res-panel {
    width: 100%;
    background: linear-gradient(135deg,#1e120a,#2d1e0e);
    border: 2px solid #6B4A14; border-top-color: #4A7030;
    border-radius: 0 0 12px 12px; padding: 8px 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  .res-panel-title {
    font-size: 0.7rem; color: #806030; text-align: center; margin-bottom: 8px; letter-spacing: 1px;
  }

  .res-grid {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 6px;
  }

  .res-item {
    background: rgba(0,0,0,0.3); border: 1px solid #4A3218; border-radius: 8px;
    padding: 8px 6px; display: flex; flex-direction: column; align-items: center; gap: 3px;
  }

  .res-icon { font-size: 1.2rem; line-height: 1; }
  .res-label { font-size: 0.7rem; color: #A08040; }
  .res-now { font-size: 1.3rem; font-weight: bold; color: #E8D0A0; line-height: 1; }
  .res-now.warn { color: #FF9944; }
  .res-now.danger { color: #FF4444; animation: pulse 0.8s infinite; }

  /* next-turn preview row */
  .res-next { font-size: 0.75rem; color: #7A8C6A; margin-top: 3px; line-height: 1.2; }
  .res-next.pos { color: #70C060; }
  .res-next.neg { color: #E05030; }
  .res-next.danger { color: #FF3020; font-weight: bold; animation: pulse 0.8s infinite; }

  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  /* ── How-to ── */
  .tip-box {
    background: rgba(0,0,0,0.45); border: 1px solid #5A3A14; border-radius: 10px;
    padding: 8px 12px; color: #C0A060; font-size: 0.67rem; line-height: 1.85; width: 100%;
  }
  .tip-box strong { color: #FFD070; }

  /* ── Overlay ── */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); display:none; align-items:center; justify-content:center; z-index:100; padding:24px; }
  .overlay.show { display:flex; }
  .overlay-box { background:linear-gradient(160deg,#F5E8C8,#E8D4A4); border:3px solid #9B7020; border-radius:18px; padding:28px 24px; text-align:center; max-width:300px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.7); animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1} }
  .overlay-box h2 { font-family:'Cinzel Decorative',serif; font-size:1.3rem; color:#3A2210; margin-bottom:10px; }
  .overlay-box p { font-size:0.82rem; color:#5C3A20; margin-bottom:16px; line-height:1.6; }

  /* ── Tutorial ── */
  .tut-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); display:flex; align-items:center; justify-content:center; z-index:200; padding:24px; }
  .tut-box { background:linear-gradient(160deg,#F5E8C8,#E8D4A4); border:3px solid #9B7020; border-radius:18px; padding:28px 24px; text-align:center; max-width:340px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.7); animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .tut-box h2 { font-family:'Cinzel Decorative',serif; font-size:1.2rem; color:#3A2210; margin-bottom:12px; }
  .tut-icon { font-size:2.5rem; margin-bottom:8px; display:block; }
  .tut-text { font-size:0.82rem; color:#5C3A20; line-height:1.7; margin-bottom:18px; }
  .tut-steps { display:flex; gap:6px; justify-content:center; margin-bottom:14px; }
  .tut-dot { width:10px; height:10px; border-radius:50%; background:#C0A070; border:1px solid #8A6030; transition:background 0.2s; }
  .tut-dot.active { background:#DAA520; border-color:#FFD060; box-shadow:0 0 6px rgba(218,165,32,0.5); }
  .tut-btns { display:flex; gap:10px; }
  .tut-btns button { flex:1; padding:10px; border:2px solid; border-radius:8px; font-family:'Noto Serif JP',serif; font-size:0.82rem; font-weight:bold; cursor:pointer; }
  .tut-skip { background:linear-gradient(135deg,#2a1a0e,#3d2b1a); border-color:#5A3A14; color:#C0A060; }
  .tut-next { background:linear-gradient(135deg,#9B7918,#DAA520); border-color:#FFD060; color:#1a0e06; }

  /* ── Enemy Cell ── */
  .cell.enemy {
    background: linear-gradient(145deg,#4A1020,#2A0810) !important;
    border: 2px solid #7A2030; cursor: pointer;
    overflow: hidden; position: relative;
    animation: enemyPulse 2.5s ease-in-out infinite;
  }
  .cell.enemy .enemy-icon { font-size:clamp(1.1rem,3.5vw,1.5rem); }
  .cell.enemy .enemy-label { font-size:0.6rem; color:#FF8080; margin-top:3px; font-weight:bold; text-shadow:0 1px 2px rgba(0,0,0,0.6); }
  .cell.enemy .enemy-cost { font-size:0.45rem; color:#CC8060; margin-top:1px; }
  .cell.enemy.enemy-affordable { border-color:#C06020; cursor:pointer; box-shadow: 0 0 8px rgba(200,100,40,0.5); }
  .cell.enemy.enemy-affordable .enemy-label { color:#FFB060; }

  /* 外敵隣接警告 */
  .enemy-warn {
    position:absolute; top:2px; right:2px;
    font-size:0.8rem; color:#FF4040;
    animation: warnBlink 1.5s ease-in-out infinite;
    text-shadow: 0 0 4px rgba(255,60,60,0.8);
  }
  @keyframes warnBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes enemyPulse {
    0%,100%{box-shadow:0 0 4px rgba(150,30,30,0.3)} 50%{box-shadow:0 0 12px rgba(200,40,40,0.5)}
  }

  /* ── Hero Overlay ── */
  .cell .hero-overlay {
    position:absolute; top:0; left:0; right:0; bottom:0;
    display:flex; align-items:flex-end; justify-content:flex-end;
    pointer-events:none; z-index:5;
  }
  .cell .hero-overlay .hero-badge {
    background:rgba(218,165,32,0.9); border-radius:50%;
    width:clamp(16px,4vw,22px); height:clamp(16px,4vw,22px);
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(0.55rem,2vw,0.7rem); margin:2px;
    box-shadow:0 0 6px rgba(255,215,0,0.8);
    border:1px solid #FFD700;
  }
  .cell.hero-here { border-color:#FFD700 !important; box-shadow:0 0 10px rgba(255,215,0,0.5) !important; }
  .cell.hero-movable {
    border:2px dashed #60C040 !important;
    box-shadow:0 0 8px rgba(100,200,60,0.4) !important;
    cursor:pointer !important;
  }
  .cell.hero-movable:hover { background:rgba(100,200,60,0.15) !important; }

  /* ── Hero Move Phase Banner ── */
  .hero-move-bar {
    background:linear-gradient(135deg,#2A1A06,#3D2B1A);
    border:1px solid #DAA520; border-radius:6px;
    padding:6px 10px; margin:4px 0; text-align:center;
    color:#FFD080; font-size:0.75rem;
  }
  .hero-move-bar button {
    background:linear-gradient(135deg,#9B7918,#DAA520);
    border:1px solid #FFD060; color:#1a0e06;
    padding:4px 12px; border-radius:4px; cursor:pointer;
    font-size:0.7rem; margin-left:8px;
  }

  /* ── Equip Panel ── */
  .equip-panel {
    display:flex; gap:6px; margin-top:4px; justify-content:center; flex-wrap:wrap;
  }
  .equip-item {
    background:linear-gradient(145deg,#2A1A06,#1A0E06);
    border:1px solid #5A3A14; border-radius:6px;
    padding:6px 10px; text-align:center; flex:1; min-width:100px;
  }
  .equip-item .eq-icon { font-size:1.1rem; }
  .equip-item .eq-name { font-size:0.6rem; color:#C0A060; }
  .equip-item .eq-stat { font-size:0.75rem; color:#E0D0A0; font-weight:bold; }
  .equip-item .eq-btn {
    background:linear-gradient(135deg,#9B7918,#DAA520);
    border:1px solid #FFD060; color:#1a0e06;
    padding:3px 10px; border-radius:4px; cursor:pointer;
    font-size:0.6rem; margin-top:4px; display:inline-block;
  }
  .equip-item .eq-btn:disabled { opacity:0.4; cursor:default; }
  .equip-item .eq-btn.maxed { background:#555; border-color:#777; color:#aaa; }

  /* ── Battle result flash ── */
  .battle-win { color:#5F5; font-weight:bold; }
  .battle-lose { color:#F88; }

  /* ── Turn Banner ── */
  .turn-banner {
    position:fixed; top:0; left:0; right:0; bottom:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.7); z-index:150; pointer-events:none;
    animation: bannerFade 1s ease-out forwards;
  }
  .turn-banner .tb-turn {
    font-family:'Cinzel Decorative',serif; font-size:2.2rem; color:#DAA520;
    text-shadow:0 0 30px rgba(218,165,32,0.7); letter-spacing:3px;
  }
  .turn-banner .tb-event {
    font-size:1rem; color:#F0DCA0; margin-top:8px; text-align:center;
    max-width:300px; line-height:1.5;
  }
  @keyframes bannerFade {
    0%{opacity:0;transform:scale(0.8)} 15%{opacity:1;transform:scale(1)}
    70%{opacity:1} 100%{opacity:0;transform:scale(1.05)}
  }

  /* ── Event flash on message bar ── */
  .message.event-good { border-color:#4A7030; background:rgba(10,40,10,0.75); color:#90E070; }
  .message.event-bad  { border-color:#7A3020; background:rgba(40,10,10,0.75); color:#FF9070; }
</style>
</head>
<body>
<h1>⚔️ 王国パズル <span style="font-size:0.5em;color:#906030;">v6.0</span></h1>

<div class="game-area">
  <div class="top-row">
    <div>ターン <span id="d-turn">0</span></div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="message" id="message">建物カードを選んで空きマスに配置しよう！</div>

  <div class="controls">
    <button class="btn btn-cancel" onclick="cancelAction()">✕ キャンセル</button>
    <button class="btn btn-next" onclick="startHeroMovePhase()">このターンはスキップ ⏭</button>
  </div>

  <!-- Stage Banner + Resource Panel -->
  <div class="stage-banner" id="stageBanner">
    <div class="sb-item"><span class="sb-label">あと何人</span><span class="sb-val" id="sb-need">-</span><span class="sb-sub" id="sb-pop">現在 -人</span></div>
    <div class="sb-item"><span class="sb-label">残りターン</span><span class="sb-val" id="sb-turn">-</span><span class="sb-sub" id="sb-stage">- / ∞</span></div>
  </div>
  <div class="res-panel">
    <div class="res-panel-title">── 資源 ─── 次ターン後 ──</div>
    <div class="res-grid">
      <div class="res-item">
        <span class="res-icon">🪵</span>
        <span class="res-label">木</span>
        <span class="res-now" id="rn-wood">0</span>
        <span class="res-next" id="rx-wood">→ 0</span>
      </div>
      <div class="res-item">
        <span class="res-icon">🪨</span>
        <span class="res-label">石</span>
        <span class="res-now" id="rn-stone">0</span>
        <span class="res-next" id="rx-stone">→ 0</span>
      </div>
      <div class="res-item">
        <span class="res-icon">🥩</span>
        <span class="res-label">肉</span>
        <span class="res-now" id="rn-meat">0</span>
        <span class="res-next" id="rx-meat">→ 0</span>
      </div>
      <div class="res-item">
        <span class="res-icon">👥</span>
        <span class="res-label">人口</span>
        <span class="res-now" id="rn-pop">0</span>
        <span class="res-next" id="rx-pop">消費-0/ターン</span>
      </div>
      <div class="res-item" style="grid-column:1/-1;flex-direction:row;justify-content:space-between;padding:4px 10px;">
        <span style="font-size:1rem;">💰</span>
        <span style="font-size:0.55rem;color:#8A6030;">金（合体コスト）</span>
        <span class="res-now" id="rn-gold" style="font-size:1.1rem;">0</span>
        <span class="res-next" id="rx-gold" style="font-size:0.55rem;color:#7A8C6A;">→ 0</span>
      </div>
    </div>
  </div>

  <!-- Cards -->
  <div class="cards-section">
    <div class="cards-label">▼ 建物を選んで配置（1ターン1つ）｜ Lv3以上は合体のみ入手</div>
    <div class="cards" id="cards"></div>
  </div>

  <div class="tip-box">
    <strong>遊び方</strong>　🏗 カード → 空きマスで配置　🔥 建物タップ → 隣の同種で合体<br>
    📊 <strong>合体は面積↓ だが生産量も↓（Lv1×2 &gt; Lv2）</strong>　💀 肉切れで人口減少
  </div>
</div>

<div id="turnBanner" style="display:none;"></div>

<div class="tut-overlay" id="tutorial" style="display:none;">
  <div class="tut-box">

// 合体コスト（Lv N→N+1 に必要な金）Lv1→2は無料
const MERGE_GOLD_COST = [5, 15, 35, 70, 140, 250, 450]; // Lv1→2: 5, Lv2→3: 15, ...
const DEMOLISH_GOLD_COST = [2, 5, 12, 25, 50, 100, 200]; // Lv1:2, Lv2:5, ...
function demolishCost(lv){ return DEMOLISH_GOLD_COST[lv-1]||2; }
function mergeCost(lv){ return MERGE_GOLD_COST[lv-1]||0; }
const B = {};
Object.entries(CHAINS).forEach(([type,arr])=>{
  arr.forEach((b,i)=>{ b.type=type; b.next=arr[i+1]?arr[i+1].id:null; B[b.id]=b; });
});

// 無限ステージ関数
const STAGE_TARGETS = [8, 24, 56, 72, 120, 240];
const STAGE_BYTURNS = [15, 30, 45, 90, 120, 150];
function getStage(n){
  const target = n < STAGE_TARGETS.length
    ? STAGE_TARGETS[n]
    : Math.round(STAGE_TARGETS[STAGE_TARGETS.length-1] * Math.pow(2, n - STAGE_TARGETS.length + 1));
  const byTurn = n < STAGE_BYTURNS.length
    ? STAGE_BYTURNS[n]
    : STAGE_BYTURNS[STAGE_BYTURNS.length-1] + (n - STAGE_BYTURNS.length + 1) * 30;
  return { target, byTurn, label: `第${n+1}段階` };
}

let S={};

function initState(){
  S={
    grid:Array(5).fill(null).map(()=>Array(5).fill(null)),
    res:{wood:30,stone:10,meat:15,gold:0}, pop:0,
    turn:0,stage:0,offered:[],
    selCard:null,selCell:null,placed:false,phase:'idle',
    msg:'建物カードを選んで空きマスに配置しよう！',
    gameOver:false,gameWon:false,maxPop:0,
    lastEvent:null,
    hero:{ r:-1, c:-1, atk:3, def:2, weapon:0, armor:0, placed:false,
           hp:20, maxHp:20, stunTurns:0 },

    battleLog:null,
  };
  placeEnemies(enemyCount(0));
  S.offered=makeOffer();
}

function enemyCount(stage){ return Math.min(4, 1 + stage); }

function placeEnemies(count){
  // 上部（row 0）から固まって配置。row 0が埋まったらrow 1へ
  const placed=[];
  // まず最初の1体を上部の空きマスにランダム配置
  const topEmpty=[];
  for(let c=0;c<5;c++){
    if(!S.grid[0][c]) topEmpty.push({r:0,c});
  }
  if(topEmpty.length===0){
    // row 0が全部埋まってたらrow 1
    for(let c=0;c<5;c++){ if(!S.grid[1][c]) topEmpty.push({r:1,c}); }
  }
  if(topEmpty.length===0) return;
  const start=topEmpty[Math.floor(Math.random()*topEmpty.length)];
  S.grid[start.r][start.c]='enemy';
  placed.push(start);

  // 残りは既存の外敵に隣接する空きマスに配置（固まる）
  const adj=[[0,1],[0,-1],[1,0],[-1,0]];
  for(let i=1;i<count;i++){
    const candidates=[];
    for(const p of placed){
      for(const [dr,dc] of adj){
        const nr=p.r+dr, nc=p.c+dc;
        if(nr<0||nr>=5||nc<0||nc>=5) continue;
        if(S.grid[nr][nc]) continue;
        if(placed.some(q=>q.r===nr&&q.c===nc)) continue;
        // 上寄りを優先（重み付け）
        candidates.push({r:nr,c:nc,w:5-nr});
      }
    }
    if(candidates.length===0) break;
    // 上寄り重み付きランダム
    const totalW=candidates.reduce((s,x)=>s+x.w,0);
    let roll=Math.random()*totalW;
    let pick=candidates[0];
    for(const c of candidates){ roll-=c.w; if(roll<=0){pick=c;break;} }
    S.grid[pick.r][pick.c]='enemy';
    placed.push(pick);
  }
}

// 外敵が隣接マスに1マス拡大
// 第1〜2段階: 空きマスのみ
// 第3段階以降: 建物も50%で破壊（勇者のいるマスは守られる）
function expandEnemy(){
  const adj=[[0,1],[0,-1],[1,0],[-1,0]];
  const candidates=[];
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){
    if(S.grid[r][c]==='enemy'){
      for(const [dr,dc] of adj){
        const nr=r+dr, nc=c+dc;
        if(nr<0||nr>=5||nc<0||nc>=5) continue;
        if(S.grid[nr][nc]==='enemy') continue;
        // 勇者がいるマスは守られる
        if(S.hero.placed && S.hero.r===nr && S.hero.c===nc) continue;
        if(!S.grid[nr][nc]){
          // 空きマス → 候補
          candidates.push({r:nr,c:nc,destroy:null});
        } else if(S.stage>=2 && Math.random()<0.5){
          // 第3段階以降: 建物破壊候補（50%）
          candidates.push({r:nr,c:nc,destroy:S.grid[nr][nc]});
        }
      }
    }
  }
  if(candidates.length>0){
    const p=candidates[Math.floor(Math.random()*candidates.length)];
    if(p.destroy){
      const b=B[p.destroy];
      S.msg=`💥 外敵が${b?b.name:'建物'}を破壊した！`;
    }
    S.grid[p.r][p.c]='enemy';
    return true;
  }
  return false;
}

function clearEnemies(){
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){
    if(S.grid[r][c]==='enemy') S.grid[r][c]=null;
  }
}

function makeOffer(){
  // 各Lvの解放・フェードアウト・消滅ステージ（index=lv-1）
  // Lv1: 最初から、Lv2: 第3段階、Lv3: 第5段階、Lv4: 第7段階...
  const UNLOCK     = [0,  2,  4,  6,  8, 10, 12];
  const FADE_START = [4,  6,  8, 10, 12, 14, 16];
  const DISAPPEAR  = [6,  8, 10, 12, 14, 16, 18];
  const types = ['lumber','food','stone','house','market'];

  function lvWeight(lv){
    const i=lv-1, s=S.stage;
    if(s < UNLOCK[i] || s >= DISAPPEAR[i]) return 0;
    if(s >= FADE_START[i]){
      const fadeLen = DISAPPEAR[i] - FADE_START[i];
      const elapsed = s - FADE_START[i];
      return Math.max(1, 4 - Math.floor(elapsed * 3 / fadeLen + 1));
    }
    return 4;
  }

  const pool = [];
  for(let lv=1; lv<=7; lv++){
    const w = lvWeight(lv);
    if(w === 0) continue;
    types.forEach(type=>{
      const b = CHAINS[type][lv-1];
      if(b) for(let i=0;i<w;i++) pool.push(b.id);
    });
  }

  pool.sort(()=>Math.random()-0.5);
  const result=[];const used=new Set();

  // Lv1が出現可能なら、1枚目は必ずLv1を入れる（序盤詰み防止）
  if(lvWeight(1)>0){
    const lv1pool = pool.filter(id=>B[id].lv===1);
    if(lv1pool.length>0){
      const pick=lv1pool[Math.floor(Math.random()*lv1pool.length)];
      result.push(pick);used.add(B[pick].type);
    }
  }

  for(const id of pool){
    const t=B[id].type;
    if(!used.has(t)){used.add(t);result.push(id);}
    if(result.length===3)break;
  }
  // fallback: 出現可能な最低Lvを補完
  if(result.length < 3){
    for(let lv=1; lv<=7 && result.length<3; lv++){
      if(lvWeight(lv)>0){
        types.forEach(type=>{
          if(result.length<3 && !result.some(id=>B[id].type===type)){
            const b=CHAINS[type][lv-1];
            if(b) result.push(b.id);
          }
        });
      }
    }
  }
  return result;
}

function calcPop(){
  let p=0;
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){
    const bid=S.grid[r][c];
    if(bid&&bid!=='enemy'&&B[bid]&&B[bid].type==='house') p+=B[bid].pop;
  }
  p=Math.max(0,p);
  if(S.maxPop!==undefined && p>S.maxPop) S.maxPop=p;
  return p;
}
function meatCost(){
  // 人口0なら消費0。それ以外は人口÷2（切り上げ）、最低1
  const pop=calcPop();
  if(pop===0) return 0;
  return Math.max(1, Math.ceil(pop/2));
}

// Compute next-turn production
function calcNextTurn(){
  let wp=0,sp=0,mp=0;
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){
    const bid=S.grid[r][c];if(!bid||bid==='enemy')continue;const b=B[bid];
    if(b&&b.prod){if(b.prod.wood)wp+=b.prod.wood;if(b.prod.stone)sp+=b.prod.stone;if(b.prod.meat)mp+=b.prod.meat;}
  }
  const consume=meatCost(); // calcPop()ベース
  let gp=0;
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){const bid=S.grid[r][c];if(bid&&bid!=='enemy'&&B[bid]&&B[bid].prod&&B[bid].prod.gold)gp+=B[bid].prod.gold;}
  return {
    wood:  S.res.wood+wp,
    stone: S.res.stone+sp,
    meat:  S.res.meat+mp-consume,
    gold:  S.res.gold+gp,
    pop:   S.pop,
    prodW:wp,prodS:sp,prodM:mp,prodG:gp,consume,
  };
}

  // hero_move フェーズのボタン切替
  const ctrlDiv=document.querySelector('.controls');

    ctrlDiv.innerHTML=`
      <button class="btn btn-cancel" onclick="skipHeroMove()">移動スキップ</button>
      <button class="btn btn-next" onclick="skipHeroMove()">戦闘のみ ⚔️</button>
    `;
  } else if(S.phase==='hero_place'){
    ctrlDiv.innerHTML=`
      <button class="btn btn-cancel" onclick="cancelHeroPlace()">キャンセル</button>
    `;
  } else {
    ctrlDiv.innerHTML=`
      <button class="btn btn-cancel" onclick="cancelAction()">✕ キャンセル</button>
      <button class="btn btn-next" onclick="startHeroMovePhase()">このターンはスキップ ⏭</button>
    `;
  }
}

function cancelHeroPlace(){
  S.phase='idle';
  S.msg='建物カードを選んで配置しよう！';
  render();
}

function renderResPanel(){
  const nx=calcNextTurn();
  const consume=meatCost();
  const meatNext=nx.meat;

  // current values + warning
  const keys=['wood','stone','meat'];
  // gold handled separately below
  keys.forEach(k=>{
    const cur=S.res[k];
    const el=document.getElementById('rn-'+k);
    el.textContent=cur;
    el.className='res-now'+(k==='meat'&&meatNext<0?' danger':k==='meat'&&meatNext<consume?' warn':'');
  });
  document.getElementById('rn-pop').textContent=S.pop;
  document.getElementById('rn-pop').className='res-now';

  // gold
  let goldProd=0;
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){const bid=S.grid[r][c];if(bid&&bid!=='enemy'&&B[bid]&&B[bid].prod&&B[bid].prod.gold)goldProd+=B[bid].prod.gold;}
  const goldNext=S.res.gold+goldProd;
  document.getElementById('rn-gold').textContent=S.res.gold;
  const gEl=document.getElementById('rx-gold');
  gEl.textContent=`→ ${goldNext}（+${goldProd}/ターン）`;
  gEl.className='res-next'+(goldProd>0?' pos':'');

  // next-turn preview
  const setNx=(key,cur,nxt)=>{
    const el=document.getElementById('rx-'+key);
    const diff=nxt-cur;
    const sign=diff>=0?'+':'';
    el.textContent=`→ ${nxt}（${sign}${diff}）`;
    el.className='res-next'+(nxt<0?' danger':diff>0?' pos':diff<0?' neg':'');
  };
  setNx('wood', S.res.wood, nx.wood);
  setNx('stone',S.res.stone,nx.stone);

  // meat: show production AND consumption
  const meatEl=document.getElementById('rx-meat');
  const mp=nx.prodM;
  const meatDiff=mp-consume; // net change per turn
  const sign=meatDiff>=0?'+':'';
  if(meatNext<0){
    meatEl.textContent=`→ 0（+${mp} -${consume} 肉不足！）`;
    meatEl.className='res-next danger';
  } else {
    meatEl.textContent=`→ ${meatNext}（+${mp} -${consume} 計${sign}${meatDiff}）`;
    meatEl.className='res-next'+(meatDiff>0?' pos':meatDiff<0?' neg':'');
  }

  // pop: show population change only
  const popEl=document.getElementById('rx-pop');
  if(meatNext<0){
    const popLoss=Math.max(1,Math.ceil(Math.abs(meatNext)));
    popEl.textContent=`⚠ 飢餓！人口-${popLoss}`;
    popEl.className='res-next danger';
  } else {
    popEl.textContent=`人口÷2 = 消費${consume}/ターン`;
    popEl.className='res-next';
  }
}

function renderGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){
    const bid=S.grid[r][c];
    const div=document.createElement('div');
    // 外敵セル
    if(bid==='enemy'){
      div.className='cell enemy';
      const eHp=getEnemyHp(r,c);
      const eMax=getEnemyMaxHp();
      div.innerHTML=`<div class="enemy-icon">👹</div><div class="enemy-label">外敵 💪${getEnemyStr()}</div><div class="enemy-cost">HP ${eHp}/${eMax}</div>`;
      div.onclick=()=>onCell(r,c);
      g.appendChild(div);continue;
    }
    div.className='cell'+(bid?'':' empty');
    if(bid){
      const b=B[bid];div.setAttribute('data-lv',b.lv);
      const isSel=S.selCell&&S.selCell.r===r&&S.selCell.c===c;
      const isMT=!isSel&&isMergeTarget(r,c);
      const prodStr=b.prod?Object.entries(b.prod).map(([k,v])=>ri(k)+v).join(' '):(b.type==='house'?`👥${b.pop}人`:'');
      div.innerHTML=`<div class="b-lvl">Lv${b.lv}</div><div class="b-icon">${b.emoji}</div><div class="b-name">${b.name}</div><div class="b-prod">${prodStr}</div>`;
      // 合体選択中：選択セルは赤、合体候補はすべて緑（phaseを問わず selCell があれば表示）
      if(isSel && S.selCell){
        div.classList.add('merge-delete');
        const lbl=document.createElement('div');
        lbl.className='merge-label del';lbl.textContent='✕ 消える';
        div.appendChild(lbl);
      } else if(isMT && S.selCell){
        div.classList.add('merge-keep');
        const lbl=document.createElement('div');
        lbl.className='merge-label keep';lbl.textContent='★ 残る';
        div.appendChild(lbl);
      } else if(isSel){
        div.classList.add('selected');
      }
    } else {
      if(S.phase==='placing')div.classList.add('can-place');
    }
    // 外敵隣接警告（建物がある場合のみ）
    if(bid && bid!=='enemy'){
      const adjE=[[0,1],[0,-1],[1,0],[-1,0]];
      let nearEnemy=false;
      for(const [dr,dc] of adjE){
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<5&&nc>=0&&nc<5&&S.grid[nr][nc]==='enemy') nearEnemy=true;
      }
      if(nearEnemy){
        const warn=document.createElement('div');
        warn.className='enemy-warn';
        warn.textContent='⚠';
        warn.title='外敵が隣接！次の段階で攻め込まれる危険';
        div.appendChild(warn);
      }
    }
    // 勇者オーバーレイ
    if(S.hero.placed && S.hero.r===r && S.hero.c===c){
      div.classList.add('hero-here');
      const ho=document.createElement('div');
      ho.className='hero-overlay';
      ho.innerHTML='<div class="hero-badge">🗡️</div>';
      div.appendChild(ho);
    }
    // 勇者移動候補ハイライト
    if(S.phase==='hero_move' && isHeroMovable(r,c)){
      div.classList.add('hero-movable');
    }
    div.addEventListener('click',()=>onCell(r,c));
    g.appendChild(div);
  }
}

function isHeroMovable(r,c){
  if(!S.hero.placed) return false;
  const dr=Math.abs(r-S.hero.r), dc=Math.abs(c-S.hero.c);
  if(dr+dc!==1) return false; // 隣接1マスのみ
  if(S.grid[r][c]==='enemy') return false; // 外敵マスには入れない
  return true;
}

function getHeroAtk(){ return S.hero.atk + S.hero.weapon * 2; }
function getHeroDef(){ return S.hero.def + S.hero.armor * 1; }
function getHeroMaxHp(){ return 20 + S.hero.armor * 5; }
function getEnemyStr(){ return 7 + S.stage * 4; }
function getEnemyMaxHp(){ return 15 + S.stage * 8; }

function getEnemyHp(r,c){
  const key=r+','+c;
  if(S.enemyHp[key]===undefined) S.enemyHp[key]=getEnemyMaxHp();
  return S.enemyHp[key];
}
function setEnemyHp(r,c,hp){ S.enemyHp[r+','+c]=hp; }
function removeEnemyHp(r,c){ delete S.enemyHp[r+','+c]; }

function heroBattle(){
  // 勇者がスタン中は戦闘なし
  if(!S.hero.placed || S.hero.stunTurns>0) return null;
  const adj=[[0,1],[0,-1],[1,0],[-1,0]];
  const enemies=[];
  for(const [dr,dc] of adj){
    const nr=S.hero.r+dr, nc=S.hero.c+dc;
    if(nr>=0&&nr<5&&nc>=0&&nc<5&&S.grid[nr][nc]==='enemy') enemies.push({r:nr,c:nc});
  }
  if(enemies.length===0) return null;

  // 最初の1体と戦闘（HP削り合い）
  const t=enemies[0];
  const heroDmg=Math.max(1, getHeroAtk() - Math.floor(getEnemyStr()/3) + Math.floor(Math.random()*3));
  const enemyDmg=Math.max(1, getEnemyStr() - getHeroDef() + Math.floor(Math.random()*3));

  // 勇者が敵を攻撃
  let eHp=getEnemyHp(t.r,t.c);
  eHp-=heroDmg;

  // 敵が勇者を攻撃
  S.hero.hp-=enemyDmg;

  let msgs=[];
  msgs.push(`⚔️ 勇者→外敵 ${heroDmg}ダメージ`);
  msgs.push(`👹 外敵→勇者 ${enemyDmg}ダメージ`);

  if(eHp<=0){
    // 敵撃破
    S.grid[t.r][t.c]=null;
    removeEnemyHp(t.r,t.c);
    msgs.push('🎉 外敵を撃破！');
    return {win:true, killed:true, msg:msgs.join(' / ')};
  }
  setEnemyHp(t.r,t.c,eHp);

  if(S.hero.hp<=0){
    // 勇者敗北
    S.hero.hp=0;
    // 装備ダウングレード
    let downMsg='';
    if(S.hero.weapon>0){ S.hero.weapon--; downMsg+=' ⚔️武器Lv↓'; }
    if(S.hero.armor>0){ S.hero.armor--; downMsg+=' 🛡️防具Lv↓'; }
    // 勇者がいた建物を破壊
    const heroBid=S.grid[S.hero.r][S.hero.c];
    if(heroBid && heroBid!=='enemy'){
      const bName=B[heroBid]?B[heroBid].name:'建物';
      S.grid[S.hero.r][S.hero.c]='enemy';
      msgs.push(`💥 ${bName}が外敵に占拠された！`);
    }
    // スタン：HP全回復まで行動不能
    S.hero.stunTurns=Math.ceil(getHeroMaxHp()/4); // 約5ターンで全回復
    S.hero.r=-1; S.hero.c=-1; S.hero.placed=false;
    msgs.push(`💀 勇者が倒れた！${S.hero.stunTurns}ターン回復中${downMsg}`);
    return {win:false, killed:false, heroDown:true, msg:msgs.join(' / ')};
  }

  msgs.push(`勇者HP:${S.hero.hp}/${getHeroMaxHp()} 敵HP:${eHp}/${getEnemyMaxHp()}`);
  return {win:false, killed:false, msg:msgs.join(' / ')};
}

function hasEnemiesOnGrid(){
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){
    if(S.grid[r][c]==='enemy') return true;
  }
  return false;
}

function startHeroMovePhase(){
  if(S.hero.stunTurns>0 || !S.hero.placed || !hasEnemiesOnGrid()){
    nextTurn();
    return;
  }
  S.phase='hero_move';
  S.msg=`🗡️ 勇者を移動させてください（HP:${S.hero.hp}/${getHeroMaxHp()}）`;
  render();
}

function heroMove(r,c){
  if(!isHeroMovable(r,c)) return;
  S.hero.r=r; S.hero.c=c;
  // 移動後、隣接外敵と自動戦闘
  const result=heroBattle();
  S.battleLog=result;
  S.phase='idle';
  if(result){
    S.msg=result.msg;
  } else {
    S.msg='🗡️ 勇者を移動しました。';
  }
  nextTurn();
}

function skipHeroMove(){
  // 移動スキップでも戦闘は発生（現在位置の隣接）
  const result=heroBattle();
  S.battleLog=result;
  S.phase='idle';
  if(result) S.msg=result.msg;
  nextTurn();
}

function isMergeTarget(r,c){
  if(!S.selCell)return false;
  const{r:sr,c:sc}=S.selCell;
  const src=S.grid[sr][sc],tgt=S.grid[r][c];
  if(!src||!tgt||src!==tgt||!B[src].next)return false;
  return Math.abs(r-sr)+Math.abs(c-sc)===1;
}

function ri(k){return{wood:'🪵',stone:'🪨',meat:'🥩',gold:'💰'}[k]||k;}

function renderCards(){
  const el=document.getElementById('cards');el.innerHTML='';
  S.offered.forEach((bid,i)=>{
    const b=B[bid];const ok=canAfford(bid);
    const div=document.createElement('div');
    div.className='card'+(S.selCard===i?' selected-card':'')+(ok?'':' locked');
    const costStr=b.cost?Object.entries(b.cost).map(([k,v])=>`${ri(k)}${v}`).join(' '):'合体のみ';
    const prodStr=b.prod?Object.entries(b.prod).map(([k,v])=>`${ri(k)}+${v}/ターン`).join(' '):(b.type==='house'?`👥${b.pop}人が住む`:'');
    let cmp='';
    if(b.lv>=2&&b.prod){
      const prev=CHAINS[b.type][b.lv-2];
      if(prev&&prev.prod){const k=Object.keys(b.prod)[0];cmp=`Lv${b.lv-1}×2=${(prev.prod[k]||0)*2} > Lv${b.lv}=${b.prod[k]||0}`;}
    }
    div.innerHTML=`<span class="c-icon">${b.emoji}</span><span class="c-lv">Lv${b.lv}</span><span class="c-name">${b.name}</span><span class="c-prod">${prodStr}</span><span class="c-cost">🔨 ${costStr}</span>${cmp?`<span class="c-compare">${cmp}</span>`:''}`;
    div.addEventListener('click',()=>onCard(i));
    el.appendChild(div);
  });

  // 勇者配置ボタン（未配置の場合）
  if(!S.hero.placed){
    const hb=document.createElement('div');
    hb.className='card';
    hb.innerHTML='<span class="c-icon">🗡️</span><span class="c-lv">勇者</span><span class="c-name">勇者を配置</span><span class="c-prod">外敵と戦える！</span><span class="c-cost">コスト無し</span>';
    hb.addEventListener('click',()=>{
      S.phase='hero_place';
      S.msg='🗡️ 勇者を配置するマスをタップしてください';
      render();
    });
    el.appendChild(hb);
  }

  // 装備ショップ
  renderEquipShop();
}

function renderEquipShop(){
  let ep=document.getElementById('equip-panel');
  if(!ep){
    ep=document.createElement('div');
    ep.id='equip-panel';
    ep.className='equip-panel';
    document.getElementById('cards').parentNode.insertBefore(ep,document.getElementById('cards').nextSibling);
  }
  const h=S.hero;
  const wCost=(h.weapon+1)*10;
  const aCost=(h.armor+1)*10;
  const wMax=false;
  const aMax=false;
  const stunMsg=h.stunTurns>0?`<div style="color:#F88;font-size:0.6rem;">💀 回復中 残り${h.stunTurns}ターン</div>`:'';
  const hpBar=h.placed||h.stunTurns>0?`<div style="font-size:0.6rem;color:${h.hp<getHeroMaxHp()/3?'#F66':h.hp<getHeroMaxHp()*2/3?'#FA0':'#6F6'};">❤️ ${h.hp}/${getHeroMaxHp()}</div>`:'';
  ep.innerHTML=`
    <div class="equip-item">
      <div class="eq-icon">🗡️</div>
      <div class="eq-name">勇者</div>
      ${hpBar}${stunMsg}
    </div>
    <div class="equip-item">
      <div class="eq-icon">⚔️</div>
      <div class="eq-name">武器 Lv${h.weapon}</div>
      <div class="eq-stat">攻撃力 ${getHeroAtk()}</div>
      ${wMax?'<div class="eq-btn maxed">MAX</div>':`<button class="eq-btn" onclick="upgradeWeapon()" ${S.res.gold<wCost?'disabled':''}>強化 💰${wCost}</button>`}
    </div>
    <div class="equip-item">
      <div class="eq-icon">🛡️</div>
      <div class="eq-name">防具 Lv${h.armor}</div>
      <div class="eq-stat">防御力 ${getHeroDef()}</div>
      ${aMax?'<div class="eq-btn maxed">MAX</div>':`<button class="eq-btn" onclick="upgradeArmor()" ${S.res.gold<aCost?'disabled':''}>強化 💰${aCost}</button>`}
    </div>
    <div class="equip-item">
      <div class="eq-icon">👹</div>
      <div class="eq-name">外敵</div>
      <div class="eq-stat">💪${getEnemyStr()} HP${getEnemyMaxHp()}</div>
    </div>
  `;
}

function upgradeWeapon(){
  const cost=(S.hero.weapon+1)*10;
  if(S.res.gold>=cost){
    S.res.gold-=cost;S.hero.weapon++;
    S.msg=`⚔️ 武器を強化！Lv${S.hero.weapon}（攻撃力${getHeroAtk()}）`;
    render();
  }
}

function upgradeArmor(){
  const cost=(S.hero.armor+1)*10;
  if(S.res.gold>=cost){
    S.res.gold-=cost;S.hero.armor++;
    // maxHpも増えるのでHP回復
    S.hero.hp=Math.min(S.hero.hp+5, getHeroMaxHp());
    S.msg=`🛡️ 防具を強化！Lv${S.hero.armor}（防御力${getHeroDef()} HP上限${getHeroMaxHp()}）`;
    render();
  }
}

function renderInfo(){
  document.getElementById('d-turn').textContent=S.turn;
  const s=getStage(S.stage);
  const left=Math.max(0, s.byTurn-S.turn+1);
  const UNLOCK_D=[5,7,9,11,13,15,17];
  const minLvNow=UNLOCK_D.findIndex(d=>S.stage<d)+1||7;
  const UNLOCK_T=[0,0,3,5,7,9,11];
  const maxLvNow=UNLOCK_T.reduce((acc,s,i)=>S.stage>=s?i+1:acc,1);
  const need=Math.max(0,s.target-S.pop);
  const turnWarnClass=left<=3?'danger':left<=6?'warn':'';
  const needWarnClass=need===0?'good':left>0&&need/left>8?'danger':left>0&&need/left>4?'warn':'';
  document.getElementById('sb-need').textContent=need===0?'達成！':'+'+need+'人';
  document.getElementById('sb-need').className='sb-val '+(need===0?'good':needWarnClass);
  document.getElementById('sb-pop').textContent=`現在${S.pop}人 / 目標${s.target}人`;
  document.getElementById('sb-turn').textContent=left+'ターン';
  document.getElementById('sb-turn').className='sb-val '+turnWarnClass;
  document.getElementById('sb-stage').textContent=`${s.label} ｜ カードLv${minLvNow===maxLvNow?maxLvNow:minLvNow+'〜'+maxLvNow}`;
}

function onCard(i){
  if(S.placed){S.msg='このターンはすでに配置しました！次のターンへ！';render();return;}
  const bid=S.offered[i];
  if(!canAfford(bid)){const b=B[bid];S.msg='資源不足！必要: '+Object.entries(b.cost||{}).map(([k,v])=>ri(k)+v).join(' ');render();return;}
  if(S.selCard===i){S.selCard=null;S.phase='idle';S.msg='建物カードを選んで配置しよう！';}
  else{S.selCard=i;S.selCell=null;S.phase='placing';S.msg=`${B[bid].emoji} ${B[bid].name}を置く場所をタップ！`;}
  render();
}

function mergeSelectMsg(b){
  const nb=B[b.next];
  const mc=mergeCost(b.lv);
  let info='';
  if(b.prod&&nb.prod){
    const k=Object.keys(b.prod)[0];
    const icon=ri(k);
    const before=(b.prod[k]||0)*2;
    const after=nb.prod[k]||0;
    info=`\n📊 合体前: ${b.emoji}×2 = ${icon}${before}/T → 合体後: ${nb.emoji} = ${icon}${after}/ターン（-${before-after}）`;
  } else if(b.type==='house'&&nb.pop){
    const before=b.pop*2;
    const after=nb.pop;
    info=`\n📊 合体前: ${b.emoji}×2 = 👥${before}人 → 合体後: ${nb.emoji} = 👥${after}人（${after>=before?'+':''}${after-before}）`;
  }
  const mcStr=mc>0?`💰${mc}必要（所持:${S.res.gold}）`:'コスト無料';
  return `✕マークの建物が消えます → ★マークの建物をタップで合体！${info}\n[${mcStr}]　キャンセル→やめる`;
}

function onCell(r,c){
  const bid=S.grid[r][c];

  // ── 勇者移動フェーズ ──
  if(S.phase==='hero_move'){
    if(isHeroMovable(r,c)){
      heroMove(r,c);
    }
    return;
  }

  // ── 勇者配置フェーズ ──
  if(S.phase==='hero_place'){
    if(bid!=='enemy'){
      S.hero.r=r; S.hero.c=c; S.hero.placed=true;
      S.phase='idle';
      S.msg='🗡️ 勇者を配置しました！';
      render();
    }
    return;
  }

  // ── 外敵セル：勇者でのみ討伐可能 ──
  if(bid==='enemy'){
    S.msg='👹 外敵は勇者を隣に移動させて戦闘でのみ倒せます！';
    render();
    return;
  }

  // ── 配置モード ──
  if(S.phase==='placing'&&S.selCard!==null){
    if(bid){S.msg='そこには配置できません！';render();return;}
    doPlace(r,c);return;
  }

  if(bid){
    const b=B[bid];
    const isSel=S.selCell&&S.selCell.r===r&&S.selCell.c===c;

    // ── 合体モード中に「残る」側をタップ → 合体実行 ──
    if(S.phase==='merge_select'&&!isSel&&isMergeTarget(r,c)){
      doMerge(S.selCell.r,S.selCell.c,r,c);return;
    }

    // ── 選択済みを再タップ → 選択解除 ──
    if(isSel){
      S.selCell=null;
      S.phase='idle';
      S.msg='🔄 選択解除。合体したい建物をタップしてください。';
      render();return;
    }

    // ── 建物タップ → 「消える」側として選択 ──
    // （合体モード中に別建物をタップしても選択切替）
    S.selCard=null;
    S.selCell={r,c};
    if(b.next){
      S.phase='merge_select';
      const hasMN = mergeableNeighbor(r,c)!==null;
      S.msg = hasMN
        ? mergeSelectMsg(b)
        : `🔴 ${b.emoji}「${b.name}」を選択中。隣に同じ建物がないため合体不可。別の建物をタップか、キャンセルで解除。`;
    } else {
      S.phase='idle';
      S.selCell=null;
      S.msg=`${b.emoji} ${b.name}は最高Lv！合体できません。`;
    }

  } else {
    // 空マスタップ
    if(S.phase==='merge_select'||S.selCell){
      S.selCell=null;S.phase='idle';
      S.msg='🔄 選択解除。合体したい建物をタップしてください。';
    } else {
      S.msg='建物カードを選んで配置しよう！';
    }
  }
  render();
}

function doPlace(r,c){
  const bid=S.offered[S.selCard];const b=B[bid];
  Object.entries(b.cost||{}).forEach(([k,v])=>S.res[k]-=v);
  S.grid[r][c]=bid;
  S.pop=calcPop(); // 住居配置後に再計算
  S.placed=true;S.selCard=null;S.phase='idle';
  const mg=mergeableNeighbor(r,c);
  if(mg){S.selCell={r,c};S.phase='merge_select';S.msg=`✅ 配置完了！隣に合体できる建物があります。合体する → 残したい方をタップ　 合体しない → キャンセル`;}
  else{S.msg=`✅ ${b.emoji} ${b.name}を配置！`;render();setTimeout(()=>startHeroMovePhase(), 400);return;}
  render();
}

function doMerge(r1,c1,r2,c2){
  const bid=S.grid[r1][c1];const b=B[bid];const nid=b.next;const nb=B[nid];
  // 金コストチェック
  const cost=mergeCost(b.lv);
  if(cost>0&&S.res.gold<cost){
    S.msg=`💰 金が足りない！Lv${b.lv}→${b.lv+1}の合体には 💰${cost} 必要（現在${S.res.gold}）`;
    render();return;
  }
  if(cost>0) S.res.gold-=cost;
  S.grid[r2][c2]=nid;S.grid[r1][c1]=null;S.selCell=null;S.phase='idle';
  S.placed=true; // 合体で1ターン消費
  S.pop=calcPop(); // 合体後に再計算
  let diff='';
  if(b.prod&&nb.prod){const k=Object.keys(b.prod)[0];const was=(b.prod[k]||0)*2;const now=nb.prod[k]||0;diff=` 生産:${was}→${now}/ターン（-${was-now}）`;}
  const costStr=cost>0?` 💰-${cost}`:'';
  const mg=mergeableNeighbor(r2,c2);
  S.msg=`🔥 合体！${b.emoji}×2→${nb.emoji}${nb.name}！${diff}${costStr}`;
  if(mg){S.selCell={r:r2,c:c2};S.phase='merge_select';render();return;}
  // 連鎖合体なし → 勇者移動フェーズへ
  render();
  setTimeout(()=>startHeroMovePhase(), 400);
}

function mergeableNeighbor(r,c){
  const bid=S.grid[r][c];if(!bid||!B[bid].next)return null;
  for(const[dr,dc]of[[0,1],[0,-1],[1,0],[-1,0]]){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<5&&nc>=0&&nc<5&&S.grid[nr][nc]===bid)return{r:nr,c:nc};}
  return null;
}

function canAfford(bid){
  const b=B[bid];if(!b.cost)return false;
  return Object.entries(b.cost).every(([k,v])=>(S.res[k]||0)>=v);
}


function cancelAction(){
  const wasMerge = S.phase==='merge_select';
  const wasPlaced = S.placed;
  S.selCard=null;S.selCell=null;S.phase='idle';
  if(wasMerge && wasPlaced){
    S.msg='合体をキャンセル。勇者の移動へ…';
    render();
    setTimeout(()=>startHeroMovePhase(), 300);
    return;
  }
  S.msg = wasMerge ? '合体をキャンセルしました。' : '建物カードを選んで配置しよう！';
  render();
}

// ── RANDOM EVENTS ──
const EVENTS_GOOD = [
  { icon:'🎁', name:'旅商人', msg:'旅商人が資材を持ってきた！', apply:()=>{ S.res.wood+=15; return '🪵+15'; }},
  { icon:'🌾', name:'豊作', msg:'今季は豊作だ！', apply:()=>{ S.res.meat+=12; return '🥩+12'; }},
  { icon:'⛏️', name:'鉱脈発見', msg:'新たな鉱脈が見つかった！', apply:()=>{ S.res.stone+=10; return '🪨+10'; }},
  { icon:'💰', name:'徴税', msg:'民からの税収が入った！', apply:()=>{ S.res.gold+=5; return '💰+5'; }},
];
const EVENTS_BAD = [
  { icon:'🏴', name:'山賊襲来', msg:'山賊に資材を奪われた！', apply:()=>{ S.res.wood=Math.max(0,S.res.wood-18); return '🪵-18'; }},
  { icon:'🦠', name:'疫病', msg:'疫病が広がった…', apply:()=>{
    S.res.meat=Math.max(0,S.res.meat-12); return '🥩-12';
  }},
  { icon:'🌪️', name:'嵐', msg:'激しい嵐で石材が失われた！', apply:()=>{ S.res.stone=Math.max(0,S.res.stone-12); return '🪨-12'; }},
];

function triggerEvent(){
  // ターン1〜3はイベントなし
  if(S.turn<=3) return null;

  // 通常イベント: 20% + ステージ×3%（最大35%）
  const chance = 0.20 + Math.min(0.15, S.stage * 0.03);
  if(Math.random() > chance) return null;
  // 良い/悪い 50:50
  const pool = Math.random()<0.5 ? EVENTS_GOOD : EVENTS_BAD;
  const ev = pool[Math.floor(Math.random()*pool.length)];
  const detail = ev.apply();
  return { icon:ev.icon, name:ev.name, msg:ev.msg, detail, good:pool===EVENTS_GOOD };
}

// ── 外敵を討伐 ──
function enemyDefeatCost(){ return { wood: 5 + Math.floor(S.turn * 1.5), stone: 3 + S.turn }; }

function canDefeatEnemy(){ const c=enemyDefeatCost(); return S.res.wood>=c.wood && S.res.stone>=c.stone; }

function defeatEnemy(r,c){
  if(S.grid[r][c]!=='enemy') return;
  const cost=enemyDefeatCost();
  if(S.res.wood<cost.wood||S.res.stone<cost.stone){
    S.msg=`👹 討伐には 🪵${cost.wood} 🪨${cost.stone} 必要（不足）`;
    render();return;
  }
  S.res.wood-=cost.wood;
  S.res.stone-=cost.stone;
  S.grid[r][c]=null;
  S.msg=`⚔️ 外敵を討伐した！🪵-${cost.wood} 🪨-${cost.stone}`;
  render();
}

// ── TURN BANNER ──
function showTurnBanner(turnNum, eventInfo){
  const el=document.getElementById('turnBanner');
  el.className='turn-banner';
  let html=`<div class="tb-turn">⚔ ターン ${turnNum}</div>`;
  if(eventInfo){
    html+=`<div class="tb-event">${eventInfo.icon} ${eventInfo.msg}（${eventInfo.detail}）</div>`;
  }
  el.innerHTML=html;
  el.style.display='flex';
  // アニメーション終了後に非表示
  el.onanimationend=()=>{ el.style.display='none'; };
}

function nextTurn(){
  if(S.gameOver||S.gameWon)return;

  // ── 1) 前ターンの資源収穫（配置済み建物からの生産） ──
  S.pop=calcPop();
  let wp=0,sp=0,mp=0;
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){
    const bid=S.grid[r][c];if(!bid||bid==='enemy')continue;const b=B[bid];
    if(b&&b.prod){if(b.prod.wood)wp+=b.prod.wood;if(b.prod.stone)sp+=b.prod.stone;if(b.prod.meat)mp+=b.prod.meat;}
  }
  let gp=0;
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){const bid=S.grid[r][c];if(bid&&bid!=='enemy'&&B[bid]&&B[bid].prod&&B[bid].prod.gold)gp+=B[bid].prod.gold;}
  S.res.wood+=wp;S.res.stone+=sp;S.res.meat+=mp;S.res.gold+=gp;
  const consume=meatCost();S.res.meat-=consume;

  if(S.res.meat<0){
    const loss=Math.max(1,Math.ceil(Math.abs(S.res.meat)));
    const prevPop=S.pop;
    S.pop=Math.max(0,S.pop-loss);S.res.meat=0;
    if(S.pop<=0){S.gameOver=true;showOverlay('💀 ゲームオーバー',`ターン${S.turn}：食料が尽き人口が0になりました。\n\n💡 肉(🥩)が毎ターン消費されます。\n狩猟小屋や牧場で食料を確保しよう！`);return;}
    // 飢餓発生を明確に通知
    S._starvation={loss, prevPop, newPop:S.pop};
  } else {
    S._starvation=null;
  }

  // ── 2) ステージクリア判定 ──
  const st=getStage(S.stage);
  if(S.pop>=st.target){
    const leftTurns = st.byTurn - S.turn;
    const bonusW = leftTurns * 2;
    const bonusS = leftTurns * 1;
    const bonusM = leftTurns * 1;
    const bonusG = Math.ceil(leftTurns * 0.5);
    S.res.wood  += bonusW;
    S.res.stone += bonusS;
    S.res.meat  += bonusM;
    S.res.gold  += bonusG;
    // 既存の岩はそのまま残し、新ステージ分だけ追加
    const curRocks=S.grid.flat().filter(x=>x==='enemy').length;
    S.stage++;
    const targetRocks=enemyCount(S.stage);
    if(targetRocks>curRocks) placeEnemies(targetRocks-curRocks);
    const ns=getStage(S.stage);
    const bonusMsg = leftTurns>0
      ? `🎁 早期ボーナス(${leftTurns}ターン残)！🪵+${bonusW} 🪨+${bonusS} 🥩+${bonusM} 💰+${bonusG}`
      : 'ギリギリクリア！ボーナスなし';
    showBonus(bonusMsg, `次の目標: ${ns.target}人（ターン${ns.byTurn}まで）`);
    S.msg=`🎉 ${st.label}クリア！次→${ns.target}人（ターン${ns.byTurn}まで）`;
    return; // ボーナスポップアップ表示中はここで止める
  }

  // ── 3) 新ターン開始：番号を進め、バナーを表示 ──
  S.turn++;S.placed=false;S.selCard=null;S.selCell=null;S.phase='idle';

  // ── ステージ期限チェック（飢餓処理後の人口 & 新ターン番号で判定） ──
  if(S.turn>st.byTurn&&S.pop<st.target){
    S.gameOver=true;
    showOverlay('💀 ゲームオーバー',`${st.label}：ターン${st.byTurn}までに${st.target}人に届かず（${S.pop}人）`);
    return;
  }

  // 勇者のHP自然回復（毎ターン4回復、スタン中も回復）
  if(S.hero.placed || S.hero.stunTurns>0){
    const maxHp=getHeroMaxHp();
    S.hero.hp=Math.min(maxHp, S.hero.hp+4);
    // スタン回復
    if(S.hero.stunTurns>0){
      S.hero.stunTurns--;
      if(S.hero.stunTurns===0){
        S.hero.hp=maxHp; // 全回復して復活
      }
    }
  }

  // 外敵は段階切替時のみ増加（自動侵食なし）

  // ランダムイベント
  const ev=triggerEvent();
  S.lastEvent=ev;

  // ターンバナー（新ターン開始を宣言）
  showTurnBanner(S.turn, ev);

  let evMsg = ev ? ` ${ev.icon}${ev.name}！${ev.detail}` : '';
  let starveMsg = S._starvation ? ` 💀飢餓！人口${S._starvation.prevPop}→${S._starvation.newPop}（-${S._starvation.loss}人）` : '';
  S.msg=`ターン${S.turn}開始 🪵+${wp} 🪨+${sp} 🥩+${mp}-${consume}${starveMsg}${evMsg} ｜残り${st.byTurn-S.turn+1}ターン`;

  S.offered=makeOffer();render();

  // イベント・飢餓でメッセージバーに色付け
  if(S._starvation){
    const msgEl=document.getElementById('message');
    msgEl.classList.add('event-bad');
    setTimeout(()=>{ msgEl.classList.remove('event-bad'); }, 2500);
  } else if(ev){
    const msgEl=document.getElementById('message');
    msgEl.classList.add(ev.good?'event-good':'event-bad');
    setTimeout(()=>{ msgEl.classList.remove('event-good','event-bad'); }, 2000);
  }
}


// ── RANKING (localStorage) ──
function getScoreRecord(){
  return { stage:S.stage+1, turn:S.turn, maxPop:S.maxPop||S.pop, pop:S.pop, date:new Date().toLocaleDateString('ja-JP') };
}
function loadRanking(){ try{return JSON.parse(localStorage.getItem('kp_ranking'))||[];}catch(e){return [];} }
function saveRanking(record){
  const ranking=loadRanking();
  ranking.push(record);
  ranking.sort((a,b)=>b.stage-a.stage || b.maxPop-a.maxPop || b.turn-a.turn);
  if(ranking.length>10) ranking.length=10; // 上位10件
  localStorage.setItem('kp_ranking',JSON.stringify(ranking));
  return ranking;
}
function rankingHTML(ranking, current){
  if(ranking.length===0) return '';
  let html='<div style="margin-top:12px;text-align:left;font-size:0.75rem;color:#E8E0D0;max-height:180px;overflow-y:auto;">';
  html+='<div style="text-align:center;font-weight:bold;margin-bottom:6px;color:#FFF;font-size:0.85rem;">🏆 ランキング（TOP10）</div>';
  ranking.forEach((r,i)=>{
    const isCur = r===current;
    const style=isCur?'color:#5AF;font-weight:bold;background:rgba(80,160,255,0.15);border-radius:4px;':'';
    const mark=isCur?' ← NOW':'';
    html+=`<div style="${style}padding:3px 4px;">${i+1}. 第${r.stage}段階 / 最大${r.maxPop}人 / T${r.turn} (${r.date})${mark}</div>`;
  });
  html+='</div>';
  return html;
}

function showOverlay(title,msg){
  const record=getScoreRecord();
  const ranking=saveRanking(record);
  document.getElementById('o-title').textContent=title;
  document.getElementById('o-msg').innerHTML=msg.replace(/\n/g,'<br>')+rankingHTML(ranking, record);
  document.getElementById('o-btn').textContent='もう一度挑戦！';
  document.getElementById('o-btn').onclick=restartGame;
  document.getElementById('overlay').classList.add('show');
  // 5秒後に自動リスタート
  S._restartTimer=setTimeout(()=>restartGame(), 5000);
}

function showBonus(bonusMsg, nextMsg){
  document.getElementById('o-title').textContent='🎉 ステージクリア！';
  document.getElementById('o-msg').innerHTML=bonusMsg+'<br><br>'+nextMsg;
  document.getElementById('o-btn').textContent='次のステージへ ▶';
  function closeBonusAndContinue(){
    if(S._bonusTimer)clearTimeout(S._bonusTimer);
    document.getElementById('overlay').classList.remove('show');
    S.placed=false;S.selCard=null;S.selCell=null;S.phase='idle';
    S.offered=makeOffer();render();
  }
  document.getElementById('o-btn').onclick=closeBonusAndContinue;
  document.getElementById('overlay').classList.add('show');
  S._bonusTimer=setTimeout(()=>{
    document.getElementById('overlay').classList.remove('show');
    S.placed=false;S.selCard=null;S.selCell=null;S.phase='idle';
    S.offered=makeOffer();render();
  }, 3000);
}

function restartGame(){if(S._restartTimer)clearTimeout(S._restartTimer);document.getElementById('overlay').classList.remove('show');initState();S.turn=1;showTurnBanner(1,null);render();showTutorial();}

// ── TUTORIAL ──
const TUT_PAGES = [
  { icon:'🏗️', text:'下のカードから建物を選んで、\nグリッドの空きマスをタップして配置！\n1ターンに1つ配置できます。' },
  { icon:'🔥', text:'同じ種類の建物を隣に並べよう！\n建物をタップ → 隣の同種をタップで合体！\nレベルアップするけど生産量は下がるので注意。\n合体にも1ターン消費します。' },
  { icon:'🥩', text:'毎ターン人口に応じて肉を消費します。\n肉が尽きると人口が減少！\n狩猟小屋や牧場で食料を確保しよう。' },
  { icon:'🎯', text:'各ステージの人口目標を\n制限ターン内に達成しよう！\n早くクリアするほどボーナスが貰えます。\nさあ、王国を築こう！' },
];
let tutStep = 0;

function showTutorial(){
  if(localStorage.getItem('kp_tut_done')) return;
  tutStep = 0;
  document.getElementById('tutorial').style.display = 'flex';
  renderTutStep();
}
function renderTutStep(){
  document.getElementById('tut-icon').textContent = TUT_PAGES[tutStep].icon;
  document.getElementById('tut-text').textContent = TUT_PAGES[tutStep].text;
  const dots = document.getElementById('tut-steps');
  dots.innerHTML = '';
  TUT_PAGES.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'tut-dot' + (i===tutStep?' active':'');
    dots.appendChild(d);
  });
  document.getElementById('tut-btn').textContent = tutStep===TUT_PAGES.length-1 ? 'ゲーム開始！' : '次へ →';
}
function nextTutStep(){
  tutStep++;
  if(tutStep >= TUT_PAGES.length){ closeTutorial(); return; }
  renderTutStep();
}
function closeTutorial(){
  document.getElementById('tutorial').style.display = 'none';
  localStorage.setItem('kp_tut_done','1');
}

initState();S.turn=1;showTurnBanner(1,null);render();showTutorial();
</script>
